# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  templ:
    desc: Run templ with integrated server and hot reload
    cmds:
      - templ generate --watch --proxy="http://localhost:8090" --cmd="go run ./example" --open-browser=false

  tailwind:
    desc: Watch Tailwind CSS changes
    cmds:
      - |
        printf '%s\n' \
          '@source "../../../calendar/**/*.templ";' \
          '@source "../../**/*.templ";' \
          > ./example/assets/css/sources.generated.css && \
        tailwindcss -i ./example/assets/css/input.css -o ./example/assets/css/output.css --watch

  dev:
    desc: Start development server with hot reload
    cmds:
      - task --parallel tailwind templ
